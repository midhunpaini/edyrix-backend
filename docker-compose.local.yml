networks:
  edyrix_local_net:
    driver: bridge

# Shared local-infra env block — merged into backend and worker via YAML anchors.
x-local-db-env: &local-db-env
  POSTGRES_SERVER: db
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-edurix}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_ASYNC_PREFIX: "postgresql+asyncpg://"
  POSTGRES_SYNC_PREFIX: "postgresql://"
  REDIS_URL: ${LOCAL_REDIS_URL:-redis://redis:6379/0}

services:
  backend:
    container_name: edyrix_local_backend
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8010:8000"
    networks:
      - edyrix_local_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      <<: *local-db-env
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  worker:
    container_name: edyrix_local_worker
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m arq app.worker.WorkerSettings
    networks:
      - edyrix_local_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      <<: *local-db-env
    volumes:
      - ./app:/app/app
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  db:
    container_name: edyrix_local_db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edurix}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5453:5432"
    networks:
      - edyrix_local_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-edurix}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  redis:
    container_name: edyrix_local_redis
    image: redis:7-alpine
    # AOF persistence so arq jobs survive container restarts.
    command: redis-server --appendonly yes
    ports:
      - "6390:6379"
    networks:
      - edyrix_local_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  mailpit:
    container_name: edyrix_local_mailpit
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI — http://localhost:8025
      - "1025:1025"   # SMTP
    networks:
      - edyrix_local_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"

  adminer:
    container_name: edyrix_local_adminer
    image: adminer:4-standalone
    ports:
      - "8080:8080"   # Web UI - http://localhost:8080 (server: db)
    networks:
      - edyrix_local_net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"

volumes:
  postgres_data:
  redis_data:
