networks:
  edyrix_net:
    driver: bridge

services:
  backend:
    container_name: edyrix_backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        VCS_REF: "${VCS_REF:-unknown}"
        VERSION: "${VERSION:-1.0.0}"
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - edyrix_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request, sys; r = urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=8); sys.exit(0 if r.status == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    container_name: edyrix_worker
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m arq app.worker.WorkerSettings
    env_file:
      - .env
    networks:
      - edyrix_net
    # Wait for backend healthy so alembic migrations complete before arq starts.
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
